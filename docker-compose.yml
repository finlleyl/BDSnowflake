services:
  postgres:
    image: postgres:17
    container_name: bd_snowflake_pg
    environment:
      POSTGRES_DB: petshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - "./исходные данные:/csv_data"
      - ./init:/docker-entrypoint-initdb.d

volumes:
  pgdata:
